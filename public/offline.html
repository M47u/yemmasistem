<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0D4A77">
    <title>Sin conexión — Yemma ISP</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Inter, system-ui, sans-serif;
            background: #DFE9F0;
            color: #1C2B36;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 2rem;
            text-align: center;
            gap: 1rem;
        }
        .icon {
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(13,74,119,.15);
        }
        .icon svg { width: 40px; height: 40px; stroke: #6B8FA8; }
        h1 {
            font-family: 'Special Elite', Georgia, serif;
            font-size: 1.5rem;
            color: #0D4A77;
        }
        p { font-size: .9rem; color: #6B8FA8; max-width: 280px; }
        button {
            margin-top: .5rem;
            padding: 12px 28px;
            background: #0D4A77;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
</head>
<body>
    <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
            <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
    </div>
    <h1>Sin conexión</h1>
    <p>No podemos conectarnos al servidor. Revisá tu conexión a internet e intentá de nuevo.</p>
    <button onclick="window.location.reload()">Reintentar</button>
</body>
</html>
